name: PHI Status Report

permissions:
  contents: read


on:
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Run status script
        run: |
          chmod +x scripts/phi_status.sh || true
          bash scripts/phi_status.sh || true
      - name: Archive status
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phi-status
          path: |
            logs/*.log
            scripts/*.log

