name: Security Scan

on:
  push:
    branches: [ main, develop, phi-* ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run AI Token Detector
      run: |
        python scripts/ai_token_detector.py || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: security_report.md
        retention-days: 30

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      
      - name: Scan main dependencies
        run: |
          pip-audit --requirement requirements.txt --format json --output audit-main.json || true
          pip-audit --requirement requirements.txt
      
      - name: Scan service dependencies
        run: |
          for service in crm_service bims_service relationships_service oauth_server scripts/oauth_server widget_service; do
            if [ -f "$service/requirements.txt" ]; then
              echo "Scanning $service..."
              pip-audit --requirement "$service/requirements.txt" || true
            fi
          done
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: audit-*.json
          retention-days: 30

  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit (Python security linter)
        run: |
          bandit -r . -f json -o bandit-report.json -ll || true
          bandit -r . -ll
      
      - name: Run Safety (dependency security check)
        run: |
          safety check --json --output safety-report.json || true
          safety check
      
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan, code-quality]
    if: always()
    
    steps:
      - name: Post summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secret detection completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency vulnerability scan completed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Code quality & security checks completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review the job logs and artifacts for detailed results." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Last Scan**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
