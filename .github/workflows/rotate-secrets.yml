name: Rotate leaked secrets

on:
  workflow_dispatch:

jobs:
  rotate:
    name: Rotate leaked secrets (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rotate Postgres password
        env:
          POSTGRES_ADMIN_DSN: ${{ secrets.POSTGRES_ADMIN_DSN }}
          TARGET_PG_USER: ${{ secrets.TARGET_PG_USER }}
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python scripts/rotate_postgres.py
