name: Rotate leaked secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rotate:
    name: Rotate leaked secrets (manual)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install psycopg2-binary requests pynacl

      - name: Rotate Postgres password
        env:
          POSTGRES_ADMIN_DSN: ${{ secrets.POSTGRES_ADMIN_DSN }}
          TARGET_PG_USER: ${{ secrets.TARGET_PG_USER }}
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          TARGET_REPO_SECRET: POSTGRES_PASSWORD
        run: python scripts/rotate_postgres.py
