name: continuous-polish
on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  polish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - name: Run Prettier (safe formats only)
        run: |
          npx --yes prettier@3 --write "**/*.{md,mdx,json,yml,yaml}" || true
      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: autopolish formatting updates"
          branch: autopolish/continuous-polish
          delete-branch: true
          title: "chore: autopolish formatting updates"
          body: "Automated formatting updates from continuous-polish workflow"
