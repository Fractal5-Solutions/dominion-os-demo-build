name: Minimal Test Workflow

permissions:
  contents: read


on:
  workflow_dispatch:
  push:
    branches: [ test-* ]

jobs:
  test:
    name: Minimal Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Echo test
        run: echo "✅ Workflow executed successfully"
      
      - name: System info
        run: |
          echo "Runner: $(uname -a)"
          echo "Date: $(date)"
          echo "Commit: ${{ github.sha }}"

