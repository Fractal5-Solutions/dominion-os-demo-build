name: Production Deploy (Cost-Optimized)

permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/security-scan.yml'
      - '.github/workflows/canon-phi-validation.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Quick Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache test dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pip
            .pytest_cache
          key: test-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install minimal dependencies
        run: |
          pip install pytest pytest-cov bandit safety --quiet

      - name: Fast security scan
        run: |
          bandit -r . -ll -q || true
          safety check --bare || true

      - name: Check for code changes
        id: changed
        run: |
          if git diff --name-only HEAD~1 | grep -qE '\.(py|sh)$'; then
            echo "code_changed=true" >> $GITHUB_OUTPUT
          else
            echo "code_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run pytest
        if: steps.changed.outputs.code_changed == 'true'
        run: pytest --tb=short -q

  deploy:
    name: GCP Deploy
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: dominion-core-prod
      GCP_REGION: us-central1
      SERVICE_NAME: dominion-os-demo
      IMAGE_REPO: us-central1-docker.pkg.dev/dominion-core-prod/dominion-os/dominion-os-demo
      DEPLOY_ENABLED: ${{ vars.ENABLE_PROD_DEPLOY || 'false' }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Preflight deploy prerequisites
        id: preflight
        shell: bash
        env:
          GCP_ACCESS_TOKEN: ${{ secrets.GCP_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          if [ "${DEPLOY_ENABLED}" != "true" ]; then
            missing+=("ENABLE_PROD_DEPLOY variable is not true")
          fi
          if [ -z "${GCP_ACCESS_TOKEN}" ]; then
            missing+=("GCP_ACCESS_TOKEN")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.preflight.outputs.ready == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v2

      - name: Prepare Google Access Token
        if: steps.preflight.outputs.ready == 'true'
        id: gcp-token
        env:
          GCP_ACCESS_TOKEN: ${{ secrets.GCP_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_ACCESS_TOKEN}" ]; then
            echo "GCP_ACCESS_TOKEN secret is not configured" >&2
            exit 1
          fi
          TOKEN_FILE="$RUNNER_TEMP/gcp-access-token.txt"
          printf '%s' "$GCP_ACCESS_TOKEN" > "$TOKEN_FILE"
          echo "token_file=$TOKEN_FILE" >> "$GITHUB_OUTPUT"

      - if: steps.preflight.outputs.ready == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build with cache
        if: steps.preflight.outputs.ready == 'true'
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN_FILE: ${{ steps.gcp-token.outputs.token_file }}
        run: |
          docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev < "${{ steps.gcp-token.outputs.token_file }}"
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag ${IMAGE_REPO}:${{ github.sha }} \
            --push \
            .

      - name: Deploy to Cloud Run
        if: steps.preflight.outputs.ready == 'true'
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN_FILE: ${{ steps.gcp-token.outputs.token_file }}
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --project=${GCP_PROJECT_ID} \
            --image=${IMAGE_REPO}:${{ github.sha }} \
            --region=${GCP_REGION} \
            --platform=managed \
            --min-instances=0 \
            --max-instances=10 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60s \
            --concurrency=80

      - name: Skip summary
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Skipping cost-optimized deploy. Missing prerequisites: ${{ steps.preflight.outputs.missing }}"

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-failure-logs
          path: |
            *.log
          retention-days: 3
          compression-level: 9
