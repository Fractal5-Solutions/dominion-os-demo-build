name: heartbeat-commit
on:
  schedule: [{ cron: "*/30 * * * *" }]
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  beat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update heartbeat
        run: |
          mkdir -p telemetry
          date -u +"%Y-%m-%dT%H:%M:%SZ" > telemetry/heartbeat.txt
      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: heartbeat telemetry update"
          branch: autopolish/heartbeat
          delete-branch: true
          title: "chore: heartbeat telemetry update"
          body: "Automated heartbeat telemetry from monitoring system"
