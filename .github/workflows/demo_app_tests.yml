name: Automated Demo App Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install flask
      - name: Run unit and integration tests
        run: |
          python3 scripts/test_demo_app.py
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 scripts/demo_app.py scripts/test_demo_app.py
      - name: Coverage check
        run: |
          pip install coverage
          coverage run scripts/test_demo_app.py
          coverage report
