name: Production Deployment CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: dominion-core-prod
      GCP_REGION: us-central1
      SERVICE_NAME: dominion-os-demo
      IMAGE_REPO: us-central1-docker.pkg.dev/dominion-core-prod/dominion-os/dominion-os-demo
      RELEASE_MANIFEST_PATH: release-manifest.json

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Capture Release Metadata
        id: release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "${RELEASE_MANIFEST_PATH}"
          python - "${RELEASE_MANIFEST_PATH}" >> "$GITHUB_OUTPUT" <<'PY'
          import json
          import os
          import sys
          import urllib.request

          manifest_path = sys.argv[1]
          with open(manifest_path, "r", encoding="utf-8") as f:
              manifest = json.load(f)

          github_repo = os.environ["GITHUB_REPOSITORY"]
          github_sha = os.environ["GITHUB_SHA"][:12]
          owner, name = github_repo.split("/", 1)
          if name != "dominion-os-demo-build":
              raise SystemExit(
                  f"unexpected repo label '{name}'. expected 'dominion-os-demo-build'"
              )
          token = os.environ.get("GITHUB_TOKEN", "")

          def github_graphql_release_meta() -> tuple[int, str]:
              query = {
                  "query": """
                  query($owner:String!, $name:String!) {
                    repository(owner:$owner, name:$name) {
                      releases { totalCount }
                      latestRelease { tagName }
                    }
                  }
                  """,
                  "variables": {"owner": owner, "name": name},
              }
              req = urllib.request.Request(
                  "https://api.github.com/graphql",
                  data=json.dumps(query).encode("utf-8"),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github+json",
                      "User-Agent": "dominion-release-workflow",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=20) as response:
                  payload = json.loads(response.read().decode("utf-8"))
              repo = payload.get("data", {}).get("repository", {})
              releases = repo.get("releases", {}) or {}
              latest = repo.get("latestRelease") or {}
              count = int(releases.get("totalCount", 0))
              latest_tag = latest.get("tagName", "")
              return count, latest_tag

          release_count, latest_tag = github_graphql_release_meta()
          derived_version = latest_tag if latest_tag else f"r{release_count}+{github_sha}"

          source = manifest.get("source_of_truth", {})
          source_repo = source.get("repo", "")
          source_sha = source.get("sha", "")
          if not source_repo:
              raise SystemExit("release manifest must declare source_of_truth.repo")
          if not source_sha:
              raise SystemExit("release manifest must declare source_of_truth.sha")

          app_version = manifest.get("app_version", "AUTO")
          if not app_version or app_version == "AUTO":
              app_version = derived_version

          source_version = source.get("version", "AUTO")
          if not source_version or source_version == "AUTO":
              source_version = source_sha

          print(f"app_version={app_version}")
          print(f"overlay={manifest['overlay']}")
          print(f"release_repo={name}")
          print(f"source_repo={source_repo}")
          print(f"source_sha={source_sha}")
          print(f"source_version={source_version}")
          print(f"release_count={release_count}")
          print(f"latest_release_tag={latest_tag}")
          PY
          echo "release_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

      - name: Prepare Google Access Token
        id: gcp-token
        env:
          GCP_ACCESS_TOKEN: ${{ secrets.GCP_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_ACCESS_TOKEN}" ]; then
            echo "GCP_ACCESS_TOKEN secret is not configured" >&2
            exit 1
          fi
          TOKEN_FILE="$RUNNER_TEMP/gcp-access-token.txt"
          printf '%s' "$GCP_ACCESS_TOKEN" > "$TOKEN_FILE"
          echo "token_file=$TOKEN_FILE" >> "$GITHUB_OUTPUT"

      - name: Configure Artifact Registry
        run: |
          set -euo pipefail
          docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev < "${{ steps.gcp-token.outputs.token_file }}"

      - name: Verify Public Demo Release Surface
        run: |
          set -euo pipefail
          python scripts/verify_public_demo_surface.py

      - name: Build and Push Authoritative Demo Image
        run: |
          set -euo pipefail
          docker buildx build \
            --push \
            --file Dockerfile.production \
            --tag ${IMAGE_REPO}:${GITHUB_SHA} \
            --tag ${IMAGE_REPO}:latest \
            .

      - name: Resolve Live Service URLs
        id: urls
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN_FILE: ${{ steps.gcp-token.outputs.token_file }}
        run: |
          set -euo pipefail
          OAUTH_URL="$(gcloud run services describe phi-oauth-server --project ${GCP_PROJECT_ID} --region ${GCP_REGION} --format='value(status.url)')"
          WIDGET_URL="$(gcloud run services describe phi-askphi-widget --project ${GCP_PROJECT_ID} --region ${GCP_REGION} --format='value(status.url)')"
          echo "oauth_url=${OAUTH_URL}" >> "$GITHUB_OUTPUT"
          echo "widget_url=${WIDGET_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy Authoritative Demo Service
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN_FILE: ${{ steps.gcp-token.outputs.token_file }}
        run: |
          set -euo pipefail
          gcloud run deploy ${SERVICE_NAME} \
            --project ${GCP_PROJECT_ID} \
            --region ${GCP_REGION} \
            --image ${IMAGE_REPO}:${GITHUB_SHA} \
            --ingress internal-and-cloud-load-balancing \
            --no-allow-unauthenticated \
            --port 8080 \
            --service-account dominion-runtime@dominion-core-prod.iam.gserviceaccount.com \
            --set-env-vars SERVICE_NAME=${SERVICE_NAME},PROJECT_ID=${GCP_PROJECT_ID},REGION=${GCP_REGION},APP_VERSION=${{ steps.release.outputs.app_version }},OVERLAY=${{ steps.release.outputs.overlay }},RELEASE_SHA=${{ steps.release.outputs.release_sha }},RELEASE_REPO=${{ steps.release.outputs.release_repo }},SOURCE_OF_TRUTH_REPO=${{ steps.release.outputs.source_repo }},SOURCE_OF_TRUTH_SHA=${{ steps.release.outputs.source_sha }},SOURCE_OF_TRUTH_VERSION=${{ steps.release.outputs.source_version }},IMAGE_REF=${IMAGE_REPO}:${GITHUB_SHA},OAUTH_SERVER_URL=${{ steps.urls.outputs.oauth_url }},ASKPHI_WIDGET_URL=${{ steps.urls.outputs.widget_url }} \
            --quiet

      - name: Verify Live Release Contract
        env:
          CLOUDSDK_AUTH_ACCESS_TOKEN_FILE: ${{ steps.gcp-token.outputs.token_file }}
        run: |
          set -euo pipefail
          python scripts/verify_cloud_run_release.py \
            --project ${GCP_PROJECT_ID} \
            --region ${GCP_REGION} \
            --service ${SERVICE_NAME} \
            --expected-image-prefix "${IMAGE_REPO}@" \
            --expected-version "${{ steps.release.outputs.app_version }}" \
            --expected-release-repo "${{ steps.release.outputs.release_repo }}" \
            --expected-overlay "${{ steps.release.outputs.overlay }}" \
            --expected-release-sha "${{ steps.release.outputs.release_sha }}" \
            --expected-source-repo "${{ steps.release.outputs.source_repo }}" \
            --expected-source-sha "${{ steps.release.outputs.source_sha }}" \
            --expected-source-version "${{ steps.release.outputs.source_version }}"
