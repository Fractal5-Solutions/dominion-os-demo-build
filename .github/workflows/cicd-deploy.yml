name: Build & Deploy Public Demo (OIDC)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PUBLIC_DEMO_BASE_URL: https://demo-reduwyf2ra-uc.a.run.app

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENABLED: ${{ vars.ENABLE_OIDC_DEPLOY || 'false' }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || '732190342674' }}
      WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WIF_PROVIDER }}
      WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL || secrets.GCP_WIF_SA_EMAIL }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Preflight deploy prerequisites
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          if [ "${DEPLOY_ENABLED}" != "true" ]; then
            missing+=("ENABLE_OIDC_DEPLOY variable is not true")
          fi
          if [ -z "${WIF_PROVIDER}" ]; then
            missing+=("GCP_WORKLOAD_IDENTITY_PROVIDER/GCP_WIF_PROVIDER")
          fi
          if [ -z "${WIF_SERVICE_ACCOUNT}" ]; then
            missing+=("GCP_SERVICE_ACCOUNT_EMAIL/GCP_WIF_SA_EMAIL")
          fi
          if [ -z "${GCP_PROJECT_ID}" ]; then
            missing+=("GCP_PROJECT_ID")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        if: steps.preflight.outputs.ready == 'true'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: steps.preflight.outputs.ready == 'true'
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: ">= 363.0.0"

      - name: Submit Cloud Build
        if: steps.preflight.outputs.ready == 'true'
        run: |
          set -euo pipefail
          REF="${GITHUB_REF##*/}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${REF}"
          else
            TAG="${GITHUB_SHA}"
          fi

          gcloud builds submit \
            --project="${GCP_PROJECT_ID}" \
            --config=cloudbuild.yaml \
            --substitutions=_TAG="${TAG}",_REGION=us-central1,_SERVICE_NAME=demo,_AR_REPO=dominion-demo-repo,_APP_VERSION="${GITHUB_SHA}",_RELEASE_SHA="${GITHUB_SHA}"

      - name: Verify public deployment
        if: steps.preflight.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/deploy-receipt
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          from datetime import datetime, timezone

          base = os.environ["PUBLIC_DEMO_BASE_URL"].rstrip("/")
          expected_sha = os.environ["GITHUB_SHA"]
          paths = ["/demo", "/health", "/status"]
          attempts = 12
          delay = 10
          last = None

          for _ in range(attempts):
              results = []
              try:
                  for path in paths:
                      req = urllib.request.Request(base + path, headers={"User-Agent": "fractal5-deploy-verifier/1.1"})
                      with urllib.request.urlopen(req, timeout=20) as res:
                          body = res.read().decode("utf-8", errors="replace")
                          results.append({
                              "path": path,
                              "status": res.status,
                              "contentType": res.headers.get("content-type", ""),
                              "cacheControl": res.headers.get("cache-control", ""),
                              "body": body,
                          })

                  health = json.loads(next(r["body"] for r in results if r["path"] == "/health"))
                  status = json.loads(next(r["body"] for r in results if r["path"] == "/status"))
                  demo_body = next(r["body"] for r in results if r["path"] == "/demo").lower()
                  forbidden = ["all-green release evidence", "actual demo mp4 integrated", "open web mp4", "open master mp4", "direct mp4 is available", "mp4 integrated"]
                  claim_safe = not any(text in demo_body for text in forbidden)
                  revision = health.get("revision") or status.get("revision") or ""
                  release_sha = health.get("releaseCandidateSha") or status.get("releaseCandidateSha") or health.get("release_sha") or status.get("release_sha") or ""
                  fresh = all((r["status"] == 200 for r in results))
                  no_store = all("no-store" in r["cacheControl"].lower() for r in results if r["path"] in ("/health", "/status"))

                  receipt = {
                      "schema": "f5.public-demo.deploy-receipt.v1",
                      "generatedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      "expectedSha": expected_sha,
                      "revision": revision,
                      "releaseSha": release_sha,
                      "routes": [{k: v for k, v in r.items() if k != "body"} for r in results],
                      "claimSafe": claim_safe,
                      "noStore": no_store,
                      "pass": fresh and claim_safe and no_store and release_sha == expected_sha,
                  }
                  last = receipt
                  if receipt["pass"]:
                      break
              except Exception as exc:
                  last = {
                      "schema": "f5.public-demo.deploy-receipt.v1",
                      "generatedAt": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
                      "expectedSha": expected_sha,
                      "pass": False,
                      "error": type(exc).__name__,
                  }
              time.sleep(delay)

          with open("out/deploy-receipt/public-demo-deploy.json", "w", encoding="utf-8") as fh:
              json.dump(last, fh, indent=2)
              fh.write("\n")
          print(json.dumps(last, indent=2))
          if not last or not last.get("pass"):
              raise SystemExit(1)
          PY

      - name: Upload deployment receipt
        if: always() && steps.preflight.outputs.ready == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: public-demo-deploy-receipt
          path: out/deploy-receipt/public-demo-deploy.json
          if-no-files-found: error
          retention-days: 30

      - name: Skip summary
        if: steps.preflight.outputs.ready != 'true'
        run: |
          echo "Skipping OIDC deploy. Missing prerequisites: ${{ steps.preflight.outputs.missing }}"
