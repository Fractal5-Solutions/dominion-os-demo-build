name: PHI Create Pull Request

permissions:
  contents: read

on:
  push:
    branches:
      - 'phi-*'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create Pull Request to main
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'Create PR: PHI automation updates'
          title: 'PHI Automation: Workflow & Monitor'
          body: |
            This PR contains automation workflows and monitoring scripts added by PHI Sovereign Autopilot.

            - Scheduled monitor
            - PR automation
            - Documentation
          base: main
          branch: ${{ github.ref_name }}
