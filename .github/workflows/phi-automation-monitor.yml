name: PHI Automation Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch: {}

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (for any Python scripts)
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Make monitor scripts executable
        run: |
          chmod +x scripts/telemetry/continuous_monitor.sh || true
          chmod +x scripts/phi_status.sh || true

      - name: Run PHI continuous monitor (check only)
        run: |
          echo "=== PHI Automation Monitor run ==="
          bash -c 'scripts/telemetry/continuous_monitor.sh || true'
          echo "=== PHI Status Check ==="
          bash -c 'scripts/phi_status.sh || true'

      - name: Upload status logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phi-monitor-logs
          path: |
            scripts/telemetry/*.log
            logs/*.log
            || true
