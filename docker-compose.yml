version: '3.8'

services:
  # Core PHI Services (Local Development)
  phi-oauth-server:
    build: ./oauth_server
    ports:
      - "8080:8080"
    environment:
      - PHI_MODE=LOCAL_DEV
      - SOVEREIGNTY_LEVEL=9/9
    volumes:
      - ./oauth_server:/app
    restart: unless-stopped

  phi-askphi-widget:
    build: ./widget_service
    ports:
      - "8081:8080"
    environment:
      - PHI_MODE=LOCAL_DEV
      - SOVEREIGNTY_LEVEL=9/9
    volumes:
      - ./widget_service:/app
    restart: unless-stopped

  # Database (Local SQLite/PostgreSQL)
  phi-database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: phi_dominion
      POSTGRES_USER: phi_admin
      POSTGRES_PASSWORD: sovereign_password
    ports:
      - "5432:5432"
    volumes:
      - phi_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache (Local)
  phi-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - phi_redis_data:/data
    restart: unless-stopped

  # Monitoring Stack (Local Prometheus/Grafana)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: sovereign_admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  phi_db_data:
  phi_redis_data:
  grafana_data:

networks:
  phi-network:
    driver: bridge
