openapi: 3.0.3
info:
  title: Dominion OS API Specification
  version: 1.0.100
  description: |
    Comprehensive API specification for Dominion OS command-center and associated services.

    **Architecture:** Multi-tenant SaaS platform with AI-powered automation
    **Infrastructure:** Google Cloud Platform (GCP) with Cloud Run services
    **Authentication:** Bearer tokens via GitHub Enterprise + GCP IAM

    **Projects:**
    - `dominion-os-1-0-main`: Development/Staging (9 services)
    - `dominion-core-prod`: Production (13 services)

    **Core Components:**
    - AI Gateways (ChatGPT integration)
    - PHI UI (Command interface)
    - Core APIs (Dominion API, Harvesting service)
    - Billing & Monitoring services

  contact:
    name: Fractal5 Solutions
    email: matthewburbidge@fractal5solutions.com
    url: https://github.com/Fractal5-Solutions
  license:
    name: Proprietary
    url: https://github.com/Fractal5-Solutions/dominion-os-demo-build/blob/main/LICENSE

servers:
  - url: https://{service}-447370233441.{region}.run.app
    description: Google Cloud Run services
    variables:
      service:
        default: dominion-api
        description: Service name (dominion-api, dominion-harvesting, phi-ui, etc.)
      region:
        default: us-central1
        description: GCP region
        enum:
          - us-central1
          - us-east1
          - europe-west1

tags:
  - name: Health
    description: Service health and readiness checks
  - name: AI Gateway
    description: ChatGPT integration endpoints
  - name: Core API
    description: Primary Dominion OS operations
  - name: Harvesting
    description: Data collection and processing
  - name: Monitoring
    description: Observability and metrics
  - name: Billing
    description: Cost tracking and optimization

paths:
  /:
    get:
      tags:
        - Health
      summary: Root endpoint
      description: Basic service information and version
      operationId: getRoot
      responses:
        '200':
          description: Service operational
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfo'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Standard health check for load balancers and monitoring
      operationId: healthCheck
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '500':
          description: Service unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service unavailable

  /_ah/health:
    get:
      tags:
        - Health
      summary: Google App Engine health check
      description: Legacy health check endpoint for GCP compatibility
      operationId: gaeHealthCheck
      responses:
        '200':
          description: Service healthy
        '503':
          description: Service unavailable

  /ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Kubernetes-style readiness check
      operationId: readinessCheck
      responses:
        '200':
          description: Service ready to accept traffic
        '503':
          description: Service not ready

  /status:
    get:
      tags:
        - Health
        - Monitoring
      summary: Detailed status information
      description: Comprehensive service status including dependencies
      operationId: getStatus
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceStatus'

  /api/v1/chat/completions:
    post:
      tags:
        - AI Gateway
      summary: ChatGPT completions
      description: Proxy to OpenAI ChatGPT API with enterprise controls
      operationId: chatCompletions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Completion generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/harvest:
    post:
      tags:
        - Harvesting
      summary: Initiate data harvesting
      description: Start data collection job from configured sources
      operationId: startHarvest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HarvestRequest'
      responses:
        '202':
          description: Harvest job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarvestJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /api/v1/harvest/{jobId}:
    get:
      tags:
        - Harvesting
      summary: Get harvest job status
      description: Retrieve status and results of a harvesting job
      operationId: getHarvestJob
      security:
        - BearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Harvest job identifier
      responses:
        '200':
          description: Job status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarvestJob'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/metrics:
    get:
      tags:
        - Monitoring
      summary: Prometheus metrics
      description: Metrics in Prometheus exposition format
      operationId: getMetrics
      responses:
        '200':
          description: Metrics retrieved
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP http_requests_total Total HTTP requests
                  # TYPE http_requests_total counter
                  http_requests_total{method="GET",status="200"} 1234

  /api/v1/slo:
    get:
      tags:
        - Monitoring
      summary: Service Level Objectives
      description: Current SLO compliance metrics
      operationId: getSLO
      security:
        - BearerAuth: []
      responses:
        '200':
          description: SLO metrics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SLOMetrics'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: GitHub Enterprise PAT or GCP IAM token

  schemas:
    ServiceInfo:
      type: object
      required:
        - name
        - version
        - status
      properties:
        name:
          type: string
          example: dominion-api
        version:
          type: string
          example: 1.0.100
        status:
          type: string
          enum: [operational, degraded, unavailable]
        uptime:
          type: number
          description: Service uptime in seconds
        timestamp:
          type: string
          format: date-time

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, degraded]
        checks:
          type: object
          additionalProperties:
            type: boolean
          example:
            database: true
            cache: true
            external_api: false
        timestamp:
          type: string
          format: date-time

    ServiceStatus:
      allOf:
        - $ref: '#/components/schemas/ServiceInfo'
        - type: object
          properties:
            health:
              $ref: '#/components/schemas/HealthStatus'
            dependencies:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  status:
                    type: string
                    enum: [up, down, degraded]
            metrics:
              type: object
              properties:
                requests_per_second:
                  type: number
                average_latency_ms:
                  type: number
                error_rate:
                  type: number

    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          enum: [gpt-4, gpt-4-turbo, gpt-3.5-turbo]
          description: OpenAI model to use
        messages:
          type: array
          items:
            type: object
            required:
              - role
              - content
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        max_tokens:
          type: integer
          minimum: 1

    ChatCompletionResponse:
      type: object
      required:
        - id
        - object
        - created
        - model
        - choices
      properties:
        id:
          type: string
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string

    HarvestRequest:
      type: object
      required:
        - source
        - config
      properties:
        source:
          type: string
          description: Data source identifier
        config:
          type: object
          description: Source-specific configuration
        schedule:
          type: string
          description: Cron expression for recurring harvests
        filters:
          type: object
          description: Data filtering criteria

    HarvestJob:
      type: object
      required:
        - id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        records_processed:
          type: integer
        error_message:
          type: string

    SLOMetrics:
      type: object
      properties:
        availability:
          type: object
          properties:
            target:
              type: number
              example: 0.999
            current:
              type: number
              example: 0.9995
            period:
              type: string
              example: "30d"
        latency:
          type: object
          properties:
            p50_ms:
              type: number
            p95_ms:
              type: number
            p99_ms:
              type: number
        error_rate:
          type: object
          properties:
            target:
              type: number
              example: 0.001
            current:
              type: number

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
        trace_id:
          type: string

  responses:
    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "unauthorized"
            message: "Bearer token required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not_found"
            message: "Resource does not exist"

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "rate_limited"
            message: "Too many requests, please retry later"

    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "internal_error"
            message: "An unexpected error occurred"

externalDocs:
  description: GitHub Repository
  url: https://github.com/Fractal5-Solutions/dominion-os-demo-build
