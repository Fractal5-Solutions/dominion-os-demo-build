<!-- Fractal5 /demo-1 visual-runtime polish patch | 2026-07-24
     Purpose: remove empty Squarespace first-fold spacer sections and tighten the public demo bridge.
     Safe scope: only runs on pages containing #fractal5-demo-canon-light-v1 or #fractal5-demo1.
     Deployment: paste into the /demo-1 page header/code injection or a code block above the demo HTML.
-->
<style id="f5-demo1-polish-patch-20260724">
  body:has(#fractal5-demo-canon-light-v1) section:has(#fractal5-demo-canon-light-v1) .content-wrapper,
  body:has(#fractal5-demo1) section:has(#fractal5-demo1) .content-wrapper {
    padding-top: clamp(20px, 3vw, 34px) !important;
  }

  body:has(#fractal5-demo-canon-light-v1) #fractal5-demo-canon-light-v1,
  body:has(#fractal5-demo1) #fractal5-demo1 {
    margin-top: 0 !important;
  }

  body:has(#fractal5-demo-canon-light-v1) #fractal5-demo-canon-light-v1 .demo-hero,
  body:has(#fractal5-demo1) #fractal5-demo1 .fractal5-hero {
    min-height: auto !important;
    padding-top: clamp(24px, 4vw, 44px) !important;
  }

  body:has(#fractal5-demo-canon-light-v1) #fractal5-demo-canon-light-v1 .demo-shell,
  body:has(#fractal5-demo1) #fractal5-demo1.fractal5-demo1 {
    margin-top: 0 !important;
  }

  @media (max-width: 767px) {
    body:has(#fractal5-demo-canon-light-v1) section:has(#fractal5-demo-canon-light-v1) .content-wrapper,
    body:has(#fractal5-demo1) section:has(#fractal5-demo1) .content-wrapper {
      padding-top: 18px !important;
    }
  }
</style>
<script id="f5-demo1-polish-patch-js-20260724">
(function () {
  "use strict";

  function findDemoRoot() {
    return document.getElementById("fractal5-demo-canon-light-v1") ||
      document.getElementById("fractal5-demo1");
  }

  function isEmptySpacer(section) {
    if (!section) return false;
    var text = (section.textContent || "").replace(/\s+/g, "").trim();
    if (text.length >= 60) return false;
    if (section.querySelector("img, video, iframe, canvas, form, button, a[href]")) return false;
    return true;
  }

  function hideSection(section) {
    section.setAttribute("data-fractal5-demo1-hidden-spacer", "true");
    section.style.display = "none";
    section.style.minHeight = "0";
    section.style.height = "0";
    section.style.padding = "0";
    section.style.margin = "0";
    section.style.overflow = "hidden";
  }

  function applyPatch() {
    var root = findDemoRoot();
    if (!root) return;

    root.setAttribute("data-fractal5-demo1-polish", "active");
    root.style.marginTop = "0";

    var section = root.closest("section.page-section") || root.closest("section");
    if (section) {
      var wrapper = section.querySelector(".content-wrapper");
      if (wrapper) wrapper.style.paddingTop = "clamp(20px, 3vw, 34px)";
    }

    var sectionsRoot = document.querySelector("#sections");
    if (!sectionsRoot || !section) return;

    Array.prototype.slice.call(sectionsRoot.querySelectorAll(":scope > section.page-section, :scope > section"))
      .some(function (candidate) {
        if (candidate === section || candidate.contains(root)) return true;
        if (isEmptySpacer(candidate)) hideSection(candidate);
        return false;
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", applyPatch, { once: true });
  } else {
    applyPatch();
  }

  window.setTimeout(applyPatch, 750);
})();
</script>
