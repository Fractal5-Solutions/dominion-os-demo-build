version: '3.8'

services:
  # API Gateway Service
  dominion-gateway:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: dominion-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=dominion-gateway
      - PROJECT_ID=${PROJECT_ID}
      - REGION=${REGION}
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - dominion-network

  # Main API Service
  dominion-api:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: dominion-api
    ports:
      - "8081:8080"
    environment:
      - SERVICE_NAME=dominion-api
      - PROJECT_ID=${PROJECT_ID}
      - REGION=${REGION}
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dominion-network

  # Demo Service
  dominion-demo-service:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: dominion-demo-service
    ports:
      - "8082:8080"
    environment:
      - SERVICE_NAME=dominion-demo-service
      - PROJECT_ID=${PROJECT_ID}
      - REGION=${REGION}
      - ENV=production
      - DEMO_MODE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - dominion-network

  # OAuth Server
  phi-oauth-server:
    build:
      context: ./oauth_server
      dockerfile: Dockerfile
    container_name: phi-oauth-server
    ports:
      - "8083:8080"
    environment:
      - SERVICE_NAME=phi-oauth-server
      - PROJECT_ID=${PROJECT_ID}
      - REGION=${REGION}
      - ENV=production
    restart: unless-stopped
    networks:
      - dominion-network

  # Monitoring & Observability
  prometheus:
    image: prom/prometheus:latest
    container_name: dominion-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - dominion-network

  grafana:
    image: grafana/grafana:latest
    container_name: dominion-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - dominion-network

networks:
  dominion-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
