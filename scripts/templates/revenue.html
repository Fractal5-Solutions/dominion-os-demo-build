<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHI Financial - Revenue Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .revenue-stream-card { transition: transform 0.2s; }
        .revenue-stream-card:hover { transform: translateY(-2px); }
        .status-recognized { color: #28a745; }
        .status-deferred { color: #ffc107; }
        .status-pending { color: #6c757d; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-chart-line me-2"></i>PHI Financial
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenditures">Expenditures</a></li>
                    <li class="nav-item"><a class="nav-link" href="/companies">Companies</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chart-of-accounts">Chart of Accounts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/general-ledger">General Ledger</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/revenue">Revenue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/financial-statements">Financial Statements</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-dollar-sign me-2"></i>Revenue Management</h1>
                    <div>
                        <select class="form-select d-inline-block w-auto me-2" id="companyFilter">
                            <option value="">All Companies</option>
                        </select>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addRevenueStreamModal">
                            <i class="fas fa-plus me-2"></i>Add Revenue Stream
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="row mb-4" id="revenueSummaryCards">
            <!-- Summary cards will be loaded here -->
        </div>

        <!-- Revenue Streams -->
        <div class="row mb-4">
            <div class="col-12">
                <h3>Revenue Streams</h3>
                <div class="row" id="revenueStreamsContainer">
                    <!-- Revenue streams will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Revenue Recognition Schedule -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Revenue Recognition Schedule</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="recognitionTable">
                                <thead>
                                    <tr>
                                        <th>Revenue Stream</th>
                                        <th>Recognition Date</th>
                                        <th>Amount</th>
                                        <th>Method</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="recognitionBody">
                                    <!-- Recognition entries will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Revenue Stream Modal -->
    <div class="modal fade" id="addRevenueStreamModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Revenue Stream</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addRevenueStreamForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Stream Name *</label>
                                    <input type="text" class="form-control" name="stream_name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Company *</label>
                                    <select class="form-control" name="company_id" id="revenueCompanySelect" required>
                                        <!-- Companies will be loaded here -->
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Contract Value *</label>
                                    <input type="number" class="form-control" name="contract_value" step="0.01" min="0" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Recognition Method *</label>
                                    <select class="form-control" name="recognition_method" required>
                                        <option value="STRAIGHT_LINE">Straight Line</option>
                                        <option value="PERCENTAGE_COMPLETION">Percentage of Completion</option>
                                        <option value="MILESTONE">Milestone</option>
                                        <option value="USAGE_BASED">Usage Based</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Start Date *</label>
                                    <input type="date" class="form-control" name="start_date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">End Date *</label>
                                    <input type="date" class="form-control" name="end_date" required>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" name="description" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addRevenueStream()">Add Revenue Stream</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadCompanies();
            loadRevenueData();
        });

        async function loadCompanies() {
            try {
                const response = await fetch('/api/companies');
                const data = await response.json();

                const companyFilter = document.getElementById('companyFilter');
                const revenueCompanySelect = document.getElementById('revenueCompanySelect');

                data.companies.forEach(company => {
                    const option1 = new Option(company.company_name, company.id);
                    const option2 = new Option(company.company_name, company.id);
                    companyFilter.appendChild(option1);
                    revenueCompanySelect.appendChild(option2);
                });
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }

        async function loadRevenueData() {
            try {
                // Load revenue streams
                const streamsResponse = await fetch('/api/revenue/streams');
                const streamsData = await streamsResponse.json();

                // Load recognition schedule
                const recognitionResponse = await fetch('/api/revenue/recognition');
                const recognitionData = await recognitionResponse.json();

                updateRevenueSummary(streamsData.summary);
                populateRevenueStreams(streamsData.streams);
                populateRecognitionTable(recognitionData.recognitions);

            } catch (error) {
                console.error('Error loading revenue data:', error);
            }
        }

        function updateRevenueSummary(summary) {
            const container = document.getElementById('revenueSummaryCards');
            container.innerHTML = `
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="card-title">Total Contract Value</h5>
                            <h3>$${(summary.total_contract_value || 0).toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="card-title">Recognized Revenue</h5>
                            <h3>$${(summary.total_recognized || 0).toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning">
                        <div class="card-body">
                            <h5 class="card-title">Deferred Revenue</h5>
                            <h3>$${(summary.total_deferred || 0).toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-info">
                        <div class="card-body">
                            <h5 class="card-title">Active Streams</h5>
                            <h3>${summary.active_streams || 0}</h3>
                        </div>
                    </div>
                </div>
            `;
        }

        function populateRevenueStreams(streams) {
            const container = document.getElementById('revenueStreamsContainer');
            container.innerHTML = '';

            streams.forEach(stream => {
                const card = createRevenueStreamCard(stream);
                container.appendChild(card);
            });
        }

        function createRevenueStreamCard(stream) {
            const col = document.createElement('div');
            col.className = 'col-md-6 col-lg-4 mb-4';

            const progressPercent = stream.recognized_percentage || 0;
            const statusClass = stream.status === 'RECOGNIZED' ? 'status-recognized' :
                               stream.status === 'DEFERRED' ? 'status-deferred' : 'status-pending';

            col.innerHTML = `
                <div class="card revenue-stream-card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">${stream.stream_name}</h5>
                        <span class="badge bg-${stream.status === 'RECOGNIZED' ? 'success' :
                                               stream.status === 'DEFERRED' ? 'warning' : 'secondary'}">
                            ${stream.status}
                        </span>
                    </div>
                    <div class="card-body">
                        <p class="card-text">
                            <strong>Contract Value:</strong> $${stream.contract_value.toFixed(2)}<br>
                            <strong>Recognized:</strong> $${(stream.recognized_amount || 0).toFixed(2)}<br>
                            <strong>Method:</strong> ${stream.recognition_method.replace('_', ' ')}<br>
                            <strong>Company:</strong> ${stream.company_name}
                        </p>
                        <div class="progress mb-2">
                            <div class="progress-bar" role="progressbar" style="width: ${progressPercent}%"
                                 aria-valuenow="${progressPercent}" aria-valuemin="0" aria-valuemax="100">
                                ${progressPercent.toFixed(1)}%
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-sm btn-outline-primary me-2" onclick="viewRevenueStream('${stream.id}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="editRevenueStream('${stream.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                    </div>
                </div>
            `;

            return col;
        }

        function populateRecognitionTable(recognitions) {
            const tbody = document.getElementById('recognitionBody');
            tbody.innerHTML = '';

            recognitions.forEach(recognition => {
                const row = document.createElement('tr');

                const recognitionDate = new Date(recognition.recognition_date).toLocaleDateString();
                const statusClass = recognition.status === 'RECOGNIZED' ? 'status-recognized' :
                                   recognition.status === 'DEFERRED' ? 'status-deferred' : 'status-pending';

                row.innerHTML = `
                    <td>${recognition.stream_name}</td>
                    <td>${recognitionDate}</td>
                    <td>$${recognition.amount.toFixed(2)}</td>
                    <td>${recognition.method.replace('_', ' ')}</td>
                    <td><span class="badge bg-${recognition.status === 'RECOGNIZED' ? 'success' :
                                               recognition.status === 'DEFERRED' ? 'warning' : 'secondary'}">
                        ${recognition.status}
                    </span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="viewRecognition('${recognition.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                `;

                tbody.appendChild(row);
            });
        }

        function addRevenueStream() {
            const form = document.getElementById('addRevenueStreamForm');
            const formData = new FormData(form);
            const streamData = Object.fromEntries(formData);

            // TODO: Implement API call to add revenue stream
            console.log('Adding revenue stream:', streamData);

            // Close modal and reload
            bootstrap.Modal.getInstance(document.getElementById('addRevenueStreamModal')).hide();
            loadRevenueData();
        }

        function viewRevenueStream(streamId) {
            // TODO: Implement revenue stream details view
            alert('Revenue stream details view - Coming soon!');
        }

        function editRevenueStream(streamId) {
            // TODO: Implement revenue stream editing
            alert('Revenue stream editing - Coming soon!');
        }

        function viewRecognition(recognitionId) {
            // TODO: Implement recognition details view
            alert('Recognition details view - Coming soon!');
        }

        // Filter functionality
        document.getElementById('companyFilter').addEventListener('change', function() {
            const selectedCompany = this.value;
            // TODO: Implement filtering logic
            console.log('Filtering by company:', selectedCompany);
        });
    </script>
</body>
</html>
