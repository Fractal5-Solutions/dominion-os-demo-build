<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHI Financial - Company Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .company-card { transition: transform 0.2s; }
        .company-card:hover { transform: translateY(-2px); }
        .status-active { color: #28a745; }
        .status-inactive { color: #6c757d; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-building me-2"></i>PHI Financial
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenditures">Expenditures</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/companies">Companies</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chart-of-accounts">Chart of Accounts</a></li>
                    <li class="nav-item"><a class="nav-link" href="/general-ledger">General Ledger</a></li>
                    <li class="nav-item"><a class="nav-link" href="/revenue">Revenue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/financial-statements">Financial Statements</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-building me-2"></i>Company Management</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCompanyModal">
                        <i class="fas fa-plus me-2"></i>Add Company
                    </button>
                </div>
            </div>
        </div>

        <div class="row" id="companiesContainer">
            <!-- Companies will be loaded here -->
        </div>
    </div>

    <!-- Add Company Modal -->
    <div class="modal fade" id="addCompanyModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Company</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCompanyForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Company Name *</label>
                                    <input type="text" class="form-control" name="company_name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Legal Name</label>
                                    <input type="text" class="form-control" name="legal_name">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Industry</label>
                                    <select class="form-control" name="industry">
                                        <option value="Technology">Technology</option>
                                        <option value="Agriculture">Agriculture</option>
                                        <option value="Consulting">Consulting</option>
                                        <option value="Manufacturing">Manufacturing</option>
                                        <option value="Retail">Retail</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Currency</label>
                                    <select class="form-control" name="currency">
                                        <option value="USD">USD</option>
                                        <option value="EUR">EUR</option>
                                        <option value="GBP">GBP</option>
                                        <option value="CAD">CAD</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" name="address" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addCompany()">Add Company</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load companies on page load
        document.addEventListener('DOMContentLoaded', loadCompanies);

        async function loadCompanies() {
            try {
                const response = await fetch('/api/companies');
                const data = await response.json();

                const container = document.getElementById('companiesContainer');
                container.innerHTML = '';

                data.companies.forEach(company => {
                    const card = createCompanyCard(company);
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading companies:', error);
                document.getElementById('companiesContainer').innerHTML =
                    '<div class="col-12"><div class="alert alert-danger">Error loading companies</div></div>';
            }
        }

        function createCompanyCard(company) {
            const col = document.createElement('div');
            col.className = 'col-md-6 col-lg-4 mb-4';

            const statusClass = company.is_active ? 'status-active' : 'status-inactive';
            const statusText = company.is_active ? 'Active' : 'Inactive';

            col.innerHTML = `
                <div class="card company-card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">${company.company_name}</h5>
                        <span class="badge bg-${company.is_active ? 'success' : 'secondary'}">${statusText}</span>
                    </div>
                    <div class="card-body">
                        <p class="card-text">
                            <strong>Legal:</strong> ${company.legal_name || 'N/A'}<br>
                            <strong>Industry:</strong> ${company.industry || 'N/A'}<br>
                            <strong>Currency:</strong> ${company.currency}
                        </p>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-sm btn-outline-primary me-2" onclick="viewCompany('${company.id}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="editCompany('${company.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                    </div>
                </div>
            `;

            return col;
        }

        function addCompany() {
            const form = document.getElementById('addCompanyForm');
            const formData = new FormData(form);
            const companyData = Object.fromEntries(formData);

            // TODO: Implement API call to add company
            console.log('Adding company:', companyData);

            // Close modal and reload
            bootstrap.Modal.getInstance(document.getElementById('addCompanyModal')).hide();
            loadCompanies();
        }

        function viewCompany(companyId) {
            // TODO: Implement company details view
            alert('Company details view - Coming soon!');
        }

        function editCompany(companyId) {
            // TODO: Implement company editing
            alert('Company editing - Coming soon!');
        }
    </script>
</body>
</html>
