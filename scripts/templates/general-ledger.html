<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHI Financial - General Ledger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .transaction-row { transition: background-color 0.2s; }
        .transaction-row:hover { background-color: #f8f9fa; }
        .debit-amount { color: #dc3545; }
        .credit-amount { color: #28a745; }
        .balance-positive { color: #28a745; }
        .balance-negative { color: #dc3545; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book me-2"></i>PHI Financial
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenditures">Expenditures</a></li>
                    <li class="nav-item"><a class="nav-link" href="/companies">Companies</a></li>
                    <li class="nav-item"><a class="nav-link" href="/chart-of-accounts">Chart of Accounts</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/general-ledger">General Ledger</a></li>
                    <li class="nav-item"><a class="nav-link" href="/revenue">Revenue</a></li>
                    <li class="nav-item"><a class="nav-link" href="/financial-statements">Financial Statements</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-book me-2"></i>General Ledger</h1>
                    <div>
                        <select class="form-select d-inline-block w-auto me-2" id="companyFilter">
                            <option value="">All Companies</option>
                        </select>
                        <select class="form-select d-inline-block w-auto me-2" id="accountFilter">
                            <option value="">All Accounts</option>
                        </select>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTransactionModal">
                            <i class="fas fa-plus me-2"></i>Add Transaction
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="row mb-4" id="summaryCards">
            <!-- Summary cards will be loaded here -->
        </div>

        <!-- Transactions Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">Transaction History</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped" id="transactionsTable">
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th>Account</th>
                                        <th>Debit</th>
                                        <th>Credit</th>
                                        <th>Balance</th>
                                        <th>Reference</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="transactionsBody">
                                    <!-- Transactions will be loaded here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal fade" id="addTransactionModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Transaction</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addTransactionForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Transaction Date *</label>
                                    <input type="date" class="form-control" name="transaction_date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Company *</label>
                                    <select class="form-control" name="company_id" id="transactionCompanySelect" required>
                                        <!-- Companies will be loaded here -->
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description *</label>
                            <input type="text" class="form-control" name="description" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reference</label>
                            <input type="text" class="form-control" name="reference">
                        </div>

                        <!-- Journal Entries -->
                        <h6 class="mb-3">Journal Entries</h6>
                        <div id="journalEntries">
                            <div class="journal-entry mb-3 p-3 border rounded">
                                <div class="row">
                                    <div class="col-md-4">
                                        <label class="form-label">Account *</label>
                                        <select class="form-control account-select" name="entries[0][account_id]" required>
                                            <!-- Accounts will be loaded here -->
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Debit</label>
                                        <input type="number" class="form-control debit-amount" name="entries[0][debit]" step="0.01" min="0">
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">Credit</label>
                                        <input type="number" class="form-control credit-amount" name="entries[0][credit]" step="0.01" min="0">
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <button type="button" class="btn btn-outline-danger btn-sm remove-entry" style="display: none;">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="addJournalEntry">
                            <i class="fas fa-plus me-2"></i>Add Journal Entry
                        </button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let transactionsData = [];
        let accountsData = [];
        let entryCount = 1;

        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadCompanies();
            loadAccounts();
            loadTransactions();
        });

        async function loadCompanies() {
            try {
                const response = await fetch('/api/companies');
                const data = await response.json();

                const companyFilter = document.getElementById('companyFilter');
                const transactionCompanySelect = document.getElementById('transactionCompanySelect');

                data.companies.forEach(company => {
                    const option1 = new Option(company.company_name, company.id);
                    const option2 = new Option(company.company_name, company.id);
                    companyFilter.appendChild(option1);
                    transactionCompanySelect.appendChild(option2);
                });
            } catch (error) {
                console.error('Error loading companies:', error);
            }
        }

        async function loadAccounts() {
            try {
                const response = await fetch('/api/accounts');
                const data = await response.json();

                accountsData = data.accounts;

                const accountFilter = document.getElementById('accountFilter');
                const accountSelects = document.querySelectorAll('.account-select');

                data.accounts.forEach(account => {
                    const option1 = new Option(`${account.account_code} - ${account.account_name}`, account.id);
                    accountFilter.appendChild(option1.cloneNode(true));

                    accountSelects.forEach(select => {
                        select.appendChild(option1.cloneNode(true));
                    });
                });
            } catch (error) {
                console.error('Error loading accounts:', error);
            }
        }

        async function loadTransactions() {
            try {
                const response = await fetch('/api/transactions');
                const data = await response.json();

                transactionsData = data.transactions;
                updateSummaryCards(data.summary);
                populateTransactionsTable(data.transactions);

            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionsBody').innerHTML =
                    '<tr><td colspan="8" class="text-center text-danger">Error loading transactions</td></tr>';
            }
        }

        function updateSummaryCards(summary) {
            const container = document.getElementById('summaryCards');
            container.innerHTML = `
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="card-title">Total Transactions</h5>
                            <h3>${summary.total_transactions || 0}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="card-title">Total Debits</h5>
                            <h3>$${(summary.total_debits || 0).toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-warning">
                        <div class="card-body">
                            <h5 class="card-title">Total Credits</h5>
                            <h3>$${(summary.total_credits || 0).toFixed(2)}</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-white bg-info">
                        <div class="card-body">
                            <h5 class="card-title">Net Balance</h5>
                            <h3 class="${(summary.net_balance || 0) >= 0 ? 'balance-positive' : 'balance-negative'}">
                                $${(summary.net_balance || 0).toFixed(2)}
                            </h3>
                        </div>
                    </div>
                </div>
            `;
        }

        function populateTransactionsTable(transactions) {
            const tbody = document.getElementById('transactionsBody');
            tbody.innerHTML = '';

            transactions.forEach(transaction => {
                const row = createTransactionRow(transaction);
                tbody.appendChild(row);
            });
        }

        function createTransactionRow(transaction) {
            const row = document.createElement('tr');
            row.className = 'transaction-row';

            const date = new Date(transaction.transaction_date).toLocaleDateString();

            row.innerHTML = `
                <td>${date}</td>
                <td>${transaction.description}</td>
                <td>${transaction.account_code} - ${transaction.account_name}</td>
                <td class="debit-amount">${transaction.debit ? '$' + transaction.debit.toFixed(2) : ''}</td>
                <td class="credit-amount">${transaction.credit ? '$' + transaction.credit.toFixed(2) : ''}</td>
                <td class="${transaction.balance >= 0 ? 'balance-positive' : 'balance-negative'}">
                    <strong>$${transaction.balance.toFixed(2)}</strong>
                </td>
                <td>${transaction.reference || ''}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-1" onclick="viewTransaction('${transaction.id}')">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" onclick="editTransaction('${transaction.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                </td>
            `;

            return row;
        }

        // Add journal entry functionality
        document.getElementById('addJournalEntry').addEventListener('click', function() {
            const container = document.getElementById('journalEntries');
            const entryDiv = document.createElement('div');
            entryDiv.className = 'journal-entry mb-3 p-3 border rounded';
            entryDiv.innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Account *</label>
                        <select class="form-control account-select" name="entries[${entryCount}][account_id]" required>
                            ${Array.from(document.querySelectorAll('.account-select')[0].options).map(option =>
                                `<option value="${option.value}">${option.text}</option>`
                            ).join('')}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Debit</label>
                        <input type="number" class="form-control debit-amount" name="entries[${entryCount}][debit]" step="0.01" min="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Credit</label>
                        <input type="number" class="form-control credit-amount" name="entries[${entryCount}][credit]" step="0.01" min="0">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-outline-danger btn-sm remove-entry">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;

            container.appendChild(entryDiv);
            entryCount++;

            // Show remove buttons if more than one entry
            document.querySelectorAll('.remove-entry').forEach(btn => btn.style.display = 'block');
        });

        // Remove journal entry
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('remove-entry') || e.target.closest('.remove-entry')) {
                e.target.closest('.journal-entry').remove();
                entryCount--;

                // Hide remove buttons if only one entry left
                if (document.querySelectorAll('.journal-entry').length === 1) {
                    document.querySelectorAll('.remove-entry').forEach(btn => btn.style.display = 'none');
                }
            }
        });

        function addTransaction() {
            const form = document.getElementById('addTransactionForm');
            const formData = new FormData(form);
            const transactionData = Object.fromEntries(formData);

            // TODO: Implement API call to add transaction
            console.log('Adding transaction:', transactionData);

            // Close modal and reload
            bootstrap.Modal.getInstance(document.getElementById('addTransactionModal')).hide();
            loadTransactions();
        }

        function viewTransaction(transactionId) {
            // TODO: Implement transaction details view
            alert('Transaction details view - Coming soon!');
        }

        function editTransaction(transactionId) {
            // TODO: Implement transaction editing
            alert('Transaction editing - Coming soon!');
        }

        // Filter functionality
        document.getElementById('companyFilter').addEventListener('change', filterTransactions);
        document.getElementById('accountFilter').addEventListener('change', filterTransactions);

        function filterTransactions() {
            const companyFilter = document.getElementById('companyFilter').value;
            const accountFilter = document.getElementById('accountFilter').value;

            let filteredTransactions = transactionsData;

            if (companyFilter) {
                filteredTransactions = filteredTransactions.filter(t => t.company_id === companyFilter);
            }

            if (accountFilter) {
                filteredTransactions = filteredTransactions.filter(t => t.account_id === accountFilter);
            }

            populateTransactionsTable(filteredTransactions);
        }
    </script>
</body>
</html>
