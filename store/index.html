<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominion OS Store - Fractal5 Solutions Inc.</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23005ea2'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='52' fill='white' font-family='Arial'%3EF5%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/brand/fractal5-software.tokens.light.css">
    <link rel="stylesheet" href="/brand/fractal5-software.tokens.dark.css">
    <style>
        :root {
            --bg: var(--f5-bg, #f4f6f8);
            --surface: var(--f5-surface, #ffffff);
            --surface-2: var(--f5-surface-2, #eef2f5);
            --text: var(--f5-text, #111a21);
            --muted: var(--f5-muted, #4d5b67);
            --line: var(--f5-line, #cfd8df);
            --accent: var(--f5-accent, #005ea2);
            --accent-2: var(--f5-accent-2, #1f7a8c);
            --focus: var(--f5-focus, #005ea2);
            --shadow: var(--f5-shadow, 0 16px 40px rgba(8, 23, 38, 0.12));
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
            line-height: 1.6;
            color: var(--text);
            background:
                radial-gradient(circle at 8% 0%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 28%),
                radial-gradient(circle at 92% 0%, color-mix(in srgb, var(--accent-2) 15%, transparent), transparent 26%),
                var(--bg);
            min-height: 100vh;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 26px 18px 60px;
        }

        .hero {
            border: 1px solid var(--line);
            border-radius: 26px;
            background: color-mix(in srgb, var(--surface) 88%, transparent);
            padding: clamp(18px, 3.5vw, 32px);
            box-shadow: var(--shadow);
            margin-bottom: 22px;
        }

        .eyebrow {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 600;
        }

        h1 {
            margin: 10px 0 8px;
            font-size: clamp(2rem, 5vw, 3.4rem);
            line-height: 1;
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 0;
            max-width: 66ch;
            color: var(--muted);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .product-card {
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--surface);
            padding: 18px;
            box-shadow: var(--shadow);
            display: grid;
            gap: 12px;
        }

        .product-card:hover {
            transform: translateY(-2px);
            transition: transform 140ms ease;
        }

        .product-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border: 1px solid var(--line);
            font-size: 1.2rem;
        }

        .product-title {
            margin: 0;
            font-size: 1.15rem;
            line-height: 1.2;
        }

        .product-description {
            margin: 0;
            color: var(--muted);
            min-height: 52px;
        }

        .product-features {
            margin: 0;
            padding-left: 18px;
            display: grid;
            gap: 4px;
        }

        .price-block {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--line);
        }

        .price {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
        }

        .price-period {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            border-radius: 999px;
            border: 1px solid transparent;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            background: var(--accent);
            color: #ffffff;
            padding: 0 16px;
            width: fit-content;
        }

        .btn:hover {
            filter: brightness(1.05);
        }

        .status {
            margin-top: 16px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .error {
            margin-top: 16px;
            border: 1px solid color-mix(in srgb, var(--f5-danger, #b42318) 65%, transparent);
            background: color-mix(in srgb, var(--f5-danger, #b42318) 12%, transparent);
            color: var(--text);
            border-radius: 12px;
            padding: 12px;
        }

        .skeleton {
            min-height: 220px;
            border-radius: 20px;
            background:
                linear-gradient(110deg, color-mix(in srgb, var(--surface-2) 60%, transparent), var(--surface), color-mix(in srgb, var(--surface-2) 60%, transparent));
            background-size: 220% 100%;
            animation: shimmer 1.2s linear infinite;
            border: 1px solid var(--line);
        }

        footer {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.92rem;
        }

        :focus-visible {
            outline: 3px solid var(--focus);
            outline-offset: 2px;
        }

        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        @media (max-width: 720px) {
            main { padding: 18px 12px 44px; }
            .hero { border-radius: 18px; }
            .product-card { border-radius: 16px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <header class="hero">
            <span class="eyebrow">Fractal5 Store Surface</span>
            <h1>Dominion OS Store</h1>
            <p>Public product catalog for Fractal5 Solutions Inc., powered by the same API contract used by the demo surface.</p>
        </header>

        <section class="products" id="products" aria-live="polite">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </section>

        <div class="status" id="status">Loading products from <code>/api/products</code>...</div>
        <div class="error" id="error" hidden></div>

        <footer>
            Fractal5 Solutions Inc. · Dominion ecosystem · <a href="/demo">Open demo</a> · <a href="/health">Service health</a>
        </footer>
    </main>

    <script>
        const container = document.getElementById("products");
        const statusNode = document.getElementById("status");
        const errorNode = document.getElementById("error");

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#39;");
        }

        function getProductIcon(name) {
            if (name.includes("Google Cloud")) return "☁️";
            if (name.includes("Desktop")) return "🖥️";
            if (name.includes("Cloud Computer")) return "🖧";
            return "⚙️";
        }

        function getPricingDisplay(pricing) {
            if (pricing.monthly) return `$${pricing.monthly}`;
            if (pricing.one_time) return `$${pricing.one_time}`;
            if (pricing.hourly) return `$${pricing.hourly}`;
            return "Contact Sales";
        }

        function getPricingPeriod(pricing) {
            if (pricing.monthly) return "per month";
            if (pricing.one_time) return "one-time purchase";
            if (pricing.hourly) return "per hour";
            return "scope-based";
        }

        function renderProducts(products) {
            container.innerHTML = products.map((product) => {
                const features = Array.isArray(product.features) ? product.features : [];
                return `
                    <article class="product-card">
                        <div class="product-header">
                            <div class="product-icon" aria-hidden="true">${getProductIcon(product.name || "")}</div>
                            <h2 class="product-title">${escapeHtml(product.name || "Unnamed product")}</h2>
                        </div>
                        <p class="product-description">${escapeHtml(product.description || "No description available.")}</p>
                        <ul class="product-features">
                            ${features.map((feature) => `<li>${escapeHtml(feature)}</li>`).join("")}
                        </ul>
                        <div class="price-block">
                            <div class="price">${escapeHtml(getPricingDisplay(product.pricing || {}))}</div>
                            <div class="price-period">${escapeHtml(getPricingPeriod(product.pricing || {}))}</div>
                        </div>
                        <button class="btn" type="button" data-sku="${escapeHtml(product.sku || "")}">Request purchase</button>
                    </article>
                `;
            }).join("");

            container.querySelectorAll("button[data-sku]").forEach((button) => {
                button.addEventListener("click", () => {
                    const sku = button.getAttribute("data-sku") || "unknown";
                    window.alert(`Purchase intake started for ${sku}.`);
                });
            });

            statusNode.textContent = `Loaded ${products.length} products.`;
        }

        async function loadProducts() {
            try {
                const response = await fetch("/api/products", { headers: { "Accept": "application/json" } });
                if (!response.ok) {
                    throw new Error(`Product API returned ${response.status}`);
                }
                const products = await response.json();
                renderProducts(Array.isArray(products) ? products : []);
            } catch (error) {
                statusNode.textContent = "Store is showing fallback state.";
                errorNode.hidden = false;
                errorNode.textContent = `Unable to load live product data: ${error.message}`;
                renderProducts([]);
            }
        }

        loadProducts();
    </script>
</body>
</html>
