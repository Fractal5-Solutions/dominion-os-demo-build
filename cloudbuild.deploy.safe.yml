steps:
  - name: gcr.io/cloud-builders/gcloud
    id: auth-docker
    entrypoint: bash
    args:
      - -c
      - |
        gcloud auth configure-docker ${_REGION}-docker.pkg.dev --quiet

  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -f
      - $_DOCKERFILE
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}
      - $_BUILD_CONTEXT

  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}

  - name: gcr.io/cloud-builders/gcloud
    id: deploy-cloud-run
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        extra_auth_flag="--no-allow-unauthenticated"
        if [[ "${_ALLOW_UNAUTH}" == "true" ]]; then
          extra_auth_flag="--allow-unauthenticated"
        fi
        gcloud run deploy "${_SERVICE_NAME}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}" \
          --region "${_REGION}" \
          --platform managed \
          --ingress internal-and-cloud-load-balancing \
          ${extra_auth_flag} \
          --port 8080 \
          --set-env-vars "SERVICE_NAME=${_SERVICE_NAME},PROJECT_ID=$PROJECT_ID,REGION=${_REGION}" \
          --quiet

substitutions:
  _SERVICE_NAME: dominion-demo
  _REGION: us-central1
  _AR_REPO: dominion-demo-repo
  _DOCKERFILE: Dockerfile.production
  _BUILD_CONTEXT: .
  _TAG: latest
  _ALLOW_UNAUTH: "false"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:${_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 1200s
